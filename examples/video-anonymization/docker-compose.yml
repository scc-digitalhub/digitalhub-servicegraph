version: '3.8'

services:
  # Video Anonymization Service
  anonymization-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anonymization-service
    ports:
      - "8000:8000"
    volumes:
      # Mount output directory to persist anonymized frames
      - ./output:/app/output
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  go2rtc:
    image: alexxit/go2rtc
    privileged: true         # only for FFmpeg hardware transcoding
    restart: unless-stopped  # autorestart on fail or config change from WebUI
    volumes:
      - "./config:/config"  
    ports:
      - "1984:1984"

networks:
  default:
    name: anonymization-network
