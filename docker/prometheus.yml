global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:9090']

  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:8889']

  # Add this job if your application exposes metrics on /metrics endpoint
  # - job_name: 'digitalhub-servicegraph'
  #   static_configs:
  #     - targets: ['host.docker.internal:8080']  # Adjust port as needed
  #   metrics_path: '/metrics'