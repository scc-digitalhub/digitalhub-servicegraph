input:
  kind: "http"
  spec:
    port: 8080
flow:
  type: "sequence"
  name: "example-sequence"
  nodes:
    - type: "switch"
      name: "example-switch"
      nodes:
      - type: "service"
        name: "service-1"
        condition: '$[?$.value == "test1"]'
        config:
          kind: "http"
          spec:
            url: "https://httpbin.org/post"
            method: "POST"
            headers:
              Content-Type: "text/plain"
      - type: "service"
        name: "service-2"
        condition: '$[?$.value == "test2"]'
        config:
          kind: "http"
          spec:
            url: "https://httpbin.org/post"
            method: "POST"
            headers:
              Content-Type: "text/plain"              