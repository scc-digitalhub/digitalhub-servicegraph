input:
  kind: "http"
  spec:
    port: 8080
flow:
  type: "sequence"
  name: "example-sequence"
  nodes:
    - type: "ensemble"
      name: "example-ensemble"
      config:
        spec:
          merge_mode: "concat"
      nodes:
      - type: "service"
        name: "service-1"
        config:
          kind: "http"
          spec:
            url: "https://httpbin.org/post"
            method: "POST"
            headers:
              Content-Type: "text/plain"
      - type: "service"
        name: "service-2"
        config:
          kind: "http"
          spec:
            url: "https://httpbin.org/post"
            method: "POST"
            headers:
              Content-Type: "text/plain"              